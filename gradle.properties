# Run the Gradle daemon on JDK 17 to work around a Kotlin DSL bug where the
# bundled IntelliJ JavaVersion parser cannot handle Java 25.x version strings.
# This only affects the build tool process — the project toolchain still compiles
# and runs code with JDK 25 (Amazon Corretto).
org.gradle.java.home=/Library/Java/JavaVirtualMachines/amazon-corretto-17.jdk/Contents/Home
